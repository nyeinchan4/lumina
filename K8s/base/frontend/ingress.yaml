apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: lumina-frontend-ingress
  namespace: default
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
spec:
  ingressClassName: traefik
  rules:
  - http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: lumina-frontend-service
            port:
              number: 80
