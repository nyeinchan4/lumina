apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../../base/frontend

images:
  - name: nyeinchan312/lumina-frontend
    newTag: prod

patches:
  - target:
      kind: Deployment
      name: lumina-frontend-deployment
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 5
