apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../../base/backend

images:
  - name: nyeinchan312/lumina-backend
    newTag: prod

patches:
  - target:
      kind: Deployment
      name: lumina-backend-deployment
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 5
