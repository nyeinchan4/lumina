apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: lumina-backend
  namespace: argocd
  annotations:
    argocd-image-updater.argoproj.io/image-list: backend=<your-dockerhub-username>/lumina-backend:dev
    argocd-image-updater.argoproj.io/backend.update-strategy: digest
    argocd-image-updater.argoproj.io/backend.pull-secret: pullsecret:argocd/dockerhub-creds
spec:
  project: default
  source:
    repoURL: https://github.com/<your-username>/<your-repo>.git
    targetRevision: main
    path: K8s/base/backend
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
