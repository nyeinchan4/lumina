services:
  postgres:
    image: postgres:16-alpine
    container_name: lumina-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "35432:5432"          # host:container — matches .env DB_PORT=35432
    volumes:
      - lumina_pgdata:/var/lib/postgresql/data
      - ./app/backend/database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  lumina_pgdata:
    name: lumina_pgdata
