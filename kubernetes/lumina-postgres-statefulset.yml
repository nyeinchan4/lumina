apiVersion: v1
kind: Service
metadata:
  name: postgres-service
  labels:
    app: postgres
spec:
  type: ClusterIP          # This allows internal access only
  selector:
    app: postgres          # Must match your StatefulSet labels
  ports:
    - protocol: TCP
      port: 5432           # Internal Cluster Port
      targetPort: 5432     # Port the Container is listening on
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
spec:
  selector:
    matchLabels:
      app: postgres
  serviceName: "postgres-service"
  replicas: 1 # Standard for a single-node DB; use 3 only if you have replication logic
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
      - name: postgres
        image: postgres # Using a specific version is better than 'latest'
        ports:
        - containerPort: 5432
          name: postgres
        env:
        - name: POSTGRES_DB
          value: "coredb"
        - name: POSTGRES_USER
          value: "admin"
        - name: POSTGRES_PASSWORD
          value: "password123" # Mandatory to prevent CrashLoopBackOff
        volumeMounts:
        - name: pgdata
          mountPath: /var/lib/postgresql
  volumeClaimTemplates:
  - metadata:
      name: pgdata
    spec:
      accessModes: [ "ReadWriteOnce" ]
      # If on Docker Desktop, you can often omit storageClassName
      # or use "hostpath" / "standard"
      resources:
        requests:
          storage: 2Gi