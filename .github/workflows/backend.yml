name: Build and Push Backend

on:
  push:
    branches: [main]
    paths:
      - "app/backend/**"

jobs:
  build-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./app/backend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/lumina-backend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/lumina-backend:${{ github.sha }}

      - name: Update image tag in deployment
        run: |
          sed -i "s|image: .*/lumina-backend:.*|image: ${{ secrets.DOCKERHUB_USERNAME }}/lumina-backend:${{ github.sha }}|" k8s/base/backend/deployment.yaml
          git config user.email "github-actions@github.com"
          git config user.name "github-actions"
          git add k8s/base/backend/deployment.yaml
          git commit -m "ci: update backend image to ${{ github.sha }}"
          git push
