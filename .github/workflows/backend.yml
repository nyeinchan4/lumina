name: Build and Push Backend

on:
  push:
    branches: [master]
    paths:
      - "app/backend/**"

jobs:
  build-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./app/backend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/lumina-backend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/lumina-backend:${{ github.sha }}
